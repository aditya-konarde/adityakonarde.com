matrix:
  - name: Markdown
    aspell:
      lang: en
    dictionary:
      wordlists:
        - .spellcheck-words.txt
      encoding: utf-8
    pipeline:
      - pyspelling.filters.markdown:
          markdown_extensions:
            - pymdownnx.superfences
      - pyspelling.filters.html:
          comments: false
          ignores:
            - code
            - pre
    sources:
      - 'content/**/*.md'
    default_encoding: utf-8
