# Gitleaks configuration for adityakonarde.com
# Docs: https://github.com/gitleaks/gitleaks#configuration

title = "Gitleaks Config"

[extend]
# Use the default gitleaks config as base
useDefault = true

[allowlist]
description = "Blog content and sample data"
paths = [
    '''content\/.*\.md$''',
    '''.*\.example$''',
    '''README\.md$''',
]
regexes = [
    '''example\.com''',
    '''localhost''',
    '''127\.0\.0\.1''',
    '''password123''',
    '''admin123''',
]
