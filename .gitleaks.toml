# Gitleaks configuration for adityakonarde.com
# Docs: https://github.com/gitleaks/gitleaks#configuration

title = "Gitleaks Config"

[extend]
# Use the default gitleaks config as base
useDefault = true

# Allowlist for false positives in blog content
[[allowlist]]
description = "Blog content and sample data"
paths = [
    '''content\/.*\.md$''',
    '''.*\.example$''',
    '''README\.md$''',
]

# Allow specific patterns that are commonly false positives in blogs
[[allowlist]]
description = "Common false positive patterns"
regexes = [
    '''example\.com''',
    '''localhost''',
    '''127\.0\.0\.1''',
    '''password123''',
    '''admin123''',
]
